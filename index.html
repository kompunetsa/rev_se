<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive Cat Page - An engaging web application with an animated cat character">
    <title>Interactive Cat Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animations for cat character */
        @keyframes jump {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-50px);
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        @keyframes tailWag {
            0%, 100% {
                transform: rotateZ(-5deg);
            }
            50% {
                transform: rotateZ(5deg);
            }
        }

        @keyframes headTilt {
            0%, 100% {
                transform: rotateZ(-10deg);
            }
            50% {
                transform: rotateZ(10deg);
            }
        }

        /* Animation classes */
        .animate-jump {
            animation: jump 0.6s ease-in-out;
        }

        .animate-spin-cat {
            animation: spin 1s linear;
        }

        .animate-blink {
            animation: blink 0.4s ease-in-out;
        }

        .animate-tail-wag {
            animation: tailWag 0.5s ease-in-out;
        }

        .animate-head-tilt {
            animation: headTilt 0.5s ease-in-out;
        }

        /* Hover glow effect */
        .cat-character:hover {
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
            cursor: pointer;
        }

        /* Reduced motion support */
        @media (prefers-reduced-motion: reduce) {
            .animate-jump,
            .animate-spin-cat,
            .animate-blink,
            .animate-tail-wag,
            .animate-head-tilt {
                animation: none;
            }

            .cat-character:hover {
                filter: none;
            }
        }

        /* Ensure cat stays within viewport */
        .cat-container {
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-100 via-pink-50 to-blue-100 min-h-screen flex flex-col items-center justify-center">
    <!-- Skip to content link for accessibility -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-0 focus:left-0 focus:z-50 focus:p-4 focus:bg-blue-600 focus:text-white">
        Skip to main content
    </a>

    <!-- Main container -->
    <main id="main-content" class="w-full h-screen flex flex-col items-center justify-center px-4">
        <!-- Cat character container -->
        <div class="cat-container flex items-center justify-center flex-1 w-full">
            <img 
                id="cat-character" 
                class="cat-character max-w-full max-h-full"
                src="assets/cat.svg" 
                alt="Interactive cat character that responds to clicks and hovers"
                role="button"
                tabindex="0"
                aria-label="Interactive cat character - click or press Enter to interact"
            >
        </div>

        <!-- Control panel -->
        <div class="control-panel flex items-center justify-center gap-4 mb-8">
            <!-- Mute button -->
            <button 
                id="mute-button"
                class="mute-button px-6 py-3 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-lg transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2"
                aria-label="Toggle audio on and off"
                aria-pressed="false"
            >
                🔊 Sound On
            </button>
        </div>
    </main>

    <!-- Script entry point -->
    <script src="script.js" type="module"></script>
</body>
</html>
